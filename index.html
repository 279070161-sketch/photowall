<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Matrix // Gesture Grip Control V33.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505; 
            color: white;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            cursor: none; 
            user-select: none;
        }

        .item {
            position: absolute;
            width: 60px; 
            height: 45px; 
            background-color: #111;
            border-radius: 0; 
            cursor: none;
            z-index: 10;
            will-change: transform;
            transform-origin: center center;
            backface-visibility: hidden;
        }

        .img-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            background: #000;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1); 
            transition: filter 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .item.active {
            z-index: 5000 !important;
        }

        .item.active img {
            filter: brightness(1.1); 
            box-shadow: 0 30px 100px rgba(0,0,0,1);
        }

        .info-content {
            position: absolute;
            top: 110%; 
            left: 50%;
            text-align: center;
            opacity: 0;
            width: 500px;
            pointer-events: none;
            font-size: 9px; 
            font-weight: 300; 
            letter-spacing: 5px; 
            color: rgba(255, 255, 255, 0.8); 
            text-transform: uppercase;
            transform: translateX(-50%) scale(1);
            transform-origin: top center;
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .item.active .info-content {
            opacity: 1;
            transform: translateX(-50%) scale(0.2); 
            margin-top: 12px; 
        }

        #cursor {
            position: fixed;
            width: 18px;
            height: 18px;
            border: 0.8px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            display: none;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            mix-blend-mode: difference;
        }
        
        #cursor.pinched {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-color: #fff;
        }

        #gesture-hint {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 7px;
            letter-spacing: 3px;
            opacity: 0.3;
            text-transform: uppercase;
            pointer-events: none;
            text-align: left;
            line-height: 2;
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="grid"></div>
    <div id="cursor"></div>
    <div id="gesture-hint">
        SYSTEM: INITIALIZING...<br>
        CONTROL: MOUSE + GRIP ENABLED
    </div>
</div>

<script>
    const CONFIG = {
        W: 60, H: 45, GAP_X: 22, GAP_Y: 20,
        ROWS: 16, 
        BASE_SPEED: 0.25,
        SCALE: 5.0, 
        LERP: 0.08, 
        REPULSION_RADIUS: 500, 
        REPULSION_STRENGTH: 240,
        FRICTION: 0.93,
        // 握拳判定阈值：手指指尖到掌心的平均距离
        GRIP_THRESHOLD: 0.08, 
        DRAG_MULTIPLIER: 1.8 
    };

    let items = [];
    let scrollX = 0;
    let velocityX = 0; 
    let totalW = 0;
    let mouse = { x: -100, y: -100 };
    let activeItem = null;

    let isDragging = false;
    let lastMouseX = 0;

    function bootstrap() {
        initGrid();
        initMouse();
        initGestures().catch(err => {
            console.log("Gesture control unavailable:", err);
            updateStatus("SYSTEM: ONLINE / MOUSE ONLY");
        });
        update();
    }

    function updateStatus(text) {
        document.getElementById('gesture-hint').innerHTML = text;
    }

    function initGrid() {
        const sw = window.innerWidth;
        const sh = window.innerHeight;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        items = [];

        const cols = Math.ceil(sw / (CONFIG.W + CONFIG.GAP_X)) + 22;
        totalW = cols * (CONFIG.W + CONFIG.GAP_X);
        const gridH = CONFIG.ROWS * (CONFIG.H + CONFIG.GAP_Y);
        const startY = (sh - gridH) / 2;

        for (let r = 0; r < CONFIG.ROWS; r++) {
            for (let c = 0; c < cols; c++) {
                const el = document.createElement('div');
                el.className = 'item';
                
                const rowOffset = (r % 2 === 0) ? 0 : (CONFIG.W + CONFIG.GAP_X) / 2;
                const bx = c * (CONFIG.W + CONFIG.GAP_X) + rowOffset;
                const by = startY + r * (CONFIG.H + CONFIG.GAP_Y) + CONFIG.H/2;

                const seed = r * cols + c;
                el.innerHTML = `
                    <div class="img-wrapper">
                        <img src="https://picsum.photos/seed/${seed}/200/150">
                    </div>
                    <div class="info-content">NODE ${r}${c} // SOURCE ARCHIVE</div>
                `;

                grid.appendChild(el);

                const itemObj = {
                    el: el, bx: bx, by: by, cx: bx, cy: by,
                    active: false, scale: 1, seed: seed
                };

                el.addEventListener('mouseup', () => {
                    if (!isDragging || Math.abs(velocityX) < 1) {
                        handleSelect(itemObj);
                    }
                });
                items.push(itemObj);
            }
        }
    }

    function initMouse() {
        const cursorEl = document.getElementById('cursor');
        
        window.addEventListener('mousedown', e => {
            isDragging = true;
            lastMouseX = e.clientX;
            cursorEl.classList.add('pinched');
        });

        window.addEventListener('mousemove', e => {
            const dx = e.clientX - lastMouseX;
            mouse.x = e.clientX; 
            mouse.y = e.clientY;
            
            if (isDragging && !activeItem) {
                velocityX = dx * CONFIG.DRAG_MULTIPLIER;
            }

            lastMouseX = e.clientX;

            cursorEl.style.display = 'block';
            cursorEl.style.left = mouse.x + 'px';
            cursorEl.style.top = mouse.y + 'px';
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            cursorEl.classList.remove('pinched');
        });
    }

    function handleSelect(obj) {
        const img = obj.el.querySelector('img');

        if (obj.active) {
            obj.active = false;
            obj.el.classList.remove('active');
            activeItem = null;
            return;
        }

        if (activeItem) {
            activeItem.active = false;
            activeItem.el.classList.remove('active');
        }

        const hdUrl = `https://picsum.photos/seed/${obj.seed}/1600/1200`;
        const tempImg = new Image();
        tempImg.src = hdUrl;
        tempImg.onload = () => {
            if (obj.active) img.src = hdUrl;
        };

        obj.active = true;
        obj.el.classList.add('active');
        activeItem = obj;
    }

    function update() {
        if (!isDragging) {
            if (Math.abs(velocityX) < Math.abs(CONFIG.BASE_SPEED)) {
                velocityX = lerp(velocityX, -CONFIG.BASE_SPEED, 0.05);
            } else {
                velocityX *= CONFIG.FRICTION;
            }
        }
        
        scrollX += velocityX;
        if (scrollX > 0) scrollX -= totalW;
        if (Math.abs(scrollX) >= totalW) scrollX = 0;

        const sw = window.innerWidth;
        const sh = window.innerHeight;

        items.forEach(item => {
            let gx = (item.bx + scrollX) % totalW;
            if (gx < -CONFIG.W) gx += totalW;
            if (gx > totalW - CONFIG.W) gx -= totalW;
            
            let baseTX = gx + CONFIG.W / 2;
            let baseTY = item.by;

            let finalTX = baseTX;
            let finalTY = baseTY;
            let ts = 1;

            if (item.active) {
                finalTX = sw / 2;
                finalTY = sh / 2;
                ts = CONFIG.SCALE;
            } else {
                if (activeItem) {
                    const dx = baseTX - activeItem.cx;
                    const dy = baseTY - activeItem.cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.REPULSION_RADIUS) {
                        const force = (1 - dist / CONFIG.REPULSION_RADIUS);
                        finalTX += (dx / dist) * force * CONFIG.REPULSION_STRENGTH;
                        finalTY += (dy / dist) * force * CONFIG.REPULSION_STRENGTH;
                        ts *= (1 - force * 0.35); 
                    }
                } else {
                    const dMouse = Math.sqrt(Math.pow(baseTX - mouse.x, 2) + Math.pow(baseTY - mouse.y, 2));
                    const hoverRadius = isDragging ? 20 : 40;
                    if (dMouse < hoverRadius) ts = 1.25;
                }
            }

            if (!item.active && Math.abs(finalTX - item.cx) > sw * 0.5) item.cx = finalTX;

            item.cx = lerp(item.cx, finalTX, CONFIG.LERP);
            item.cy = lerp(item.cy, finalTY, CONFIG.LERP);
            item.scale = lerp(item.scale, ts, CONFIG.LERP);
            
            item.el.style.transform = `translate3d(${item.cx}px, ${item.cy}px, 0) translate(-50%, -50%) scale(${item.scale})`;
        });

        requestAnimationFrame(update);
    }

    function lerp(a, b, f) { return a + (b - a) * f; }

    async function initGestures() {
        const videoElement = document.createElement('video');
        videoElement.style.display = 'none';
        document.body.appendChild(videoElement);
        const cursorEl = document.getElementById('cursor');

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ 
            maxNumHands: 1, 
            modelComplexity: 1, 
            minDetectionConfidence: 0.7, 
            minTrackingConfidence: 0.7 
        });

        let lastAction = 0;
        let gestureLastX = 0;

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const now = Date.now();
                
                // 使用掌心 (landmark 9) 作为光标锚点，比指尖更稳定
                const anchor = lm[9]; 
                const currentX = (1 - anchor.x) * window.innerWidth;
                const currentY = anchor.y * window.innerHeight;
                
                const dx = currentX - mouse.x;
                mouse.x = currentX;
                mouse.y = currentY;
                
                cursorEl.style.display = 'block';
                cursorEl.style.left = mouse.x + 'px';
                cursorEl.style.top = mouse.y + 'px';

                // 握拳检测逻辑：计算指尖到掌心的平均距离
                // 如果所有指尖都靠近掌心，说明是握拳
                const fingertips = [4, 8, 12, 16, 20];
                let avgDist = 0;
                fingertips.forEach(idx => {
                    avgDist += Math.sqrt(
                        Math.pow(lm[idx].x - lm[0].x, 2) + 
                        Math.pow(lm[idx].y - lm[0].y, 2)
                    );
                });
                avgDist /= fingertips.length;

                const isGripping = avgDist < CONFIG.GRIP_THRESHOLD;

                if (isGripping) {
                    if (!isDragging) {
                        isDragging = true; // 模拟鼠标按下
                        cursorEl.classList.add('pinched');
                    }
                    // 拳头左右甩动更新速度 (模拟鼠标拖动)
                    if (!activeItem) {
                        velocityX = dx * CONFIG.DRAG_MULTIPLIER;
                    }
                    
                    // 模拟点击逻辑（保持不动一段时间视为选中）
                    if (Math.abs(dx) < 2 && now - lastAction > 1200) {
                        const target = items.find(i => {
                            const d = Math.sqrt(Math.pow(i.cx - mouse.x, 2) + Math.pow(i.cy - mouse.y, 2));
                            return i.active ? d < 200 : d < 60;
                        });
                        if (target) handleSelect(target);
                        lastAction = now;
                    }
                } else {
                    if (isDragging) {
                        isDragging = false; // 模拟鼠标抬起
                        cursorEl.classList.remove('pinched');
                    }
                }
            }
        });

        try {
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            await camera.start();
            updateStatus("SYSTEM: ONLINE<br>CONTROL: MOUSE + GRIP ENABLED");
        } catch (e) {
            throw e;
        }
    }

    window.onload = bootstrap;
    window.onresize = () => initGrid();
</script>

</body>
</html>
