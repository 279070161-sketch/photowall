<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Matrix // Cursor Sync V31.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #050505; 
            color: white;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* 隐藏默认鼠标指针，使用自定义光标 */
            cursor: none; 
        }

        .item {
            position: absolute;
            width: 60px; 
            height: 45px; 
            background-color: #111;
            border-radius: 0; 
            cursor: none; /* 保持全局无指针感 */
            z-index: 10;
            will-change: transform;
            transform-origin: center center;
            backface-visibility: hidden;
        }

        .img-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            background: #000;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(1); 
            transition: filter 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .item.active {
            z-index: 5000 !important;
        }

        .item.active img {
            filter: brightness(1.1); 
            box-shadow: 0 30px 100px rgba(0,0,0,1);
        }

        .info-content {
            position: absolute;
            top: 110%; 
            left: 50%;
            text-align: center;
            opacity: 0;
            width: 500px;
            pointer-events: none;
            font-size: 9px; 
            font-weight: 300; 
            letter-spacing: 5px; 
            color: rgba(255, 255, 255, 0.8); 
            text-transform: uppercase;
            transform: translateX(-50%) scale(1);
            transform-origin: top center;
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .item.active .info-content {
            opacity: 1;
            transform: translateX(-50%) scale(0.2); 
            margin-top: 12px; 
        }

        #cursor {
            position: fixed;
            width: 18px;
            height: 18px;
            border: 0.8px solid rgba(255,255,255,0.6); /* 略微增强对比度 */
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            display: none;
            transform: translate(-50%, -50%);
            /* 位置移动时不使用 transition 保证实时感，仅在状态切换时使用动画 */
            transition: width 0.3s, height 0.3s, background-color 0.3s;
            mix-blend-mode: difference; /* 确保在亮部也清晰可见 */
        }
        
        #cursor.pinched {
            width: 6px;
            height: 6px;
            background-color: #fff;
            border-color: #fff;
        }

        #gesture-hint {
            position: fixed;
            bottom: 30px;
            left: 30px;
            font-size: 7px;
            letter-spacing: 3px;
            opacity: 0.3;
            text-transform: uppercase;
            pointer-events: none;
            text-align: left;
            line-height: 2;
        }
    </style>
</head>
<body>

<div id="stage">
    <div id="grid"></div>
    <div id="cursor"></div>
    <div id="gesture-hint">
        SYSTEM: INITIALIZING...<br>
        CONTROL: MOUSE ENABLED
    </div>
</div>

<script>
    const CONFIG = {
        W: 60, H: 45, GAP_X: 22, GAP_Y: 20,
        ROWS: 16, 
        BASE_SPEED: 0.25,
        SCALE: 5.0, 
        LERP: 0.08, 
        REPULSION_RADIUS: 500, 
        REPULSION_STRENGTH: 240,
        FRICTION: 0.93,
        PINCH_THRESHOLD: 0.04 
    };

    let items = [];
    let scrollX = 0;
    let velocityX = 0; 
    let totalW = 0;
    let mouse = { x: -100, y: -100 };
    let activeItem = null;

    function bootstrap() {
        initGrid();
        initMouse();
        initGestures().catch(err => {
            console.log("Gesture control unavailable:", err);
            updateStatus("SYSTEM: ONLINE / MOUSE ONLY");
        });
        update();
    }

    function updateStatus(text) {
        document.getElementById('gesture-hint').innerHTML = text;
    }

    function initGrid() {
        const sw = window.innerWidth;
        const sh = window.innerHeight;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        items = [];

        const cols = Math.ceil(sw / (CONFIG.W + CONFIG.GAP_X)) + 22;
        totalW = cols * (CONFIG.W + CONFIG.GAP_X);
        const gridH = CONFIG.ROWS * (CONFIG.H + CONFIG.GAP_Y);
        const startY = (sh - gridH) / 2;

        for (let r = 0; r < CONFIG.ROWS; r++) {
            for (let c = 0; c < cols; c++) {
                const el = document.createElement('div');
                el.className = 'item';
                
                const rowOffset = (r % 2 === 0) ? 0 : (CONFIG.W + CONFIG.GAP_X) / 2;
                const bx = c * (CONFIG.W + CONFIG.GAP_X) + rowOffset;
                const by = startY + r * (CONFIG.H + CONFIG.GAP_Y) + CONFIG.H/2;

                const seed = r * cols + c;
                el.innerHTML = `
                    <div class="img-wrapper">
                        <img src="https://picsum.photos/seed/${seed}/200/150">
                    </div>
                    <div class="info-content">NODE ${r}${c} // SOURCE ARCHIVE</div>
                `;

                grid.appendChild(el);

                const itemObj = {
                    el: el, bx: bx, by: by, cx: bx, cy: by,
                    active: false, scale: 1, seed: seed
                };

                el.addEventListener('click', () => handleSelect(itemObj));
                items.push(itemObj);
            }
        }
    }

    function initMouse() {
        const cursorEl = document.getElementById('cursor');
        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX; 
            mouse.y = e.clientY;
            
            // 确保光标元素实时跟随并显示
            cursorEl.style.display = 'block';
            cursorEl.style.left = mouse.x + 'px';
            cursorEl.style.top = mouse.y + 'px';
        });

        // 鼠标离开窗口隐藏光标
        window.addEventListener('mouseleave', () => {
            cursorEl.style.display = 'none';
        });
    }

    function handleSelect(obj) {
        const img = obj.el.querySelector('img');

        if (obj.active) {
            obj.active = false;
            obj.el.classList.remove('active');
            activeItem = null;
            return;
        }

        if (activeItem) {
            activeItem.active = false;
            activeItem.el.classList.remove('active');
        }

        const hdUrl = `https://picsum.photos/seed/${obj.seed}/1600/1200`;
        const tempImg = new Image();
        tempImg.src = hdUrl;
        tempImg.onload = () => {
            if (obj.active) img.src = hdUrl;
        };

        obj.active = true;
        obj.el.classList.add('active');
        activeItem = obj;
    }

    function update() {
        if (Math.abs(velocityX) < Math.abs(CONFIG.BASE_SPEED)) {
            velocityX = lerp(velocityX, -CONFIG.BASE_SPEED, 0.05);
        } else {
            velocityX *= CONFIG.FRICTION;
        }
        
        scrollX += velocityX;
        if (scrollX > 0) scrollX -= totalW;
        if (Math.abs(scrollX) >= totalW) scrollX = 0;

        const sw = window.innerWidth;
        const sh = window.innerHeight;

        items.forEach(item => {
            let gx = (item.bx + scrollX) % totalW;
            if (gx < -CONFIG.W) gx += totalW;
            if (gx > totalW - CONFIG.W) gx -= totalW;
            
            let baseTX = gx + CONFIG.W / 2;
            let baseTY = item.by;

            let finalTX = baseTX;
            let finalTY = baseTY;
            let ts = 1;

            if (item.active) {
                finalTX = sw / 2;
                finalTY = sh / 2;
                ts = CONFIG.SCALE;
            } else {
                if (activeItem) {
                    const dx = baseTX - activeItem.cx;
                    const dy = baseTY - activeItem.cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.REPULSION_RADIUS) {
                        const force = (1 - dist / CONFIG.REPULSION_RADIUS);
                        finalTX += (dx / dist) * force * CONFIG.REPULSION_STRENGTH;
                        finalTY += (dy / dist) * force * CONFIG.REPULSION_STRENGTH;
                        ts *= (1 - force * 0.35); 
                    }
                } else {
                    const dMouse = Math.sqrt(Math.pow(baseTX - mouse.x, 2) + Math.pow(baseTY - mouse.y, 2));
                    if (dMouse < 40) ts = 1.25;
                }
            }

            if (!item.active && Math.abs(finalTX - item.cx) > sw * 0.5) item.cx = finalTX;

            item.cx = lerp(item.cx, finalTX, CONFIG.LERP);
            item.cy = lerp(item.cy, finalTY, CONFIG.LERP);
            item.scale = lerp(item.scale, ts, CONFIG.LERP);
            
            item.el.style.transform = `translate3d(${item.cx}px, ${item.cy}px, 0) translate(-50%, -50%) scale(${item.scale})`;
        });

        requestAnimationFrame(update);
    }

    function lerp(a, b, f) { return a + (b - a) * f; }

    async function initGestures() {
        const videoElement = document.createElement('video');
        videoElement.style.display = 'none';
        document.body.appendChild(videoElement);
        const cursorEl = document.getElementById('cursor');

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        let lastAction = 0;
        let xHistory = []; 
        let isPinching = false;

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const now = Date.now();
                
                const thumbTip = lm[4];
                const indexTip = lm[8];
                const palmCenter = lm[9]; 
                
                mouse.x = (1 - indexTip.x) * window.innerWidth;
                mouse.y = indexTip.y * window.innerHeight;
                
                // 同步更新光标位置
                cursorEl.style.display = 'block';
                cursorEl.style.left = mouse.x + 'px';
                cursorEl.style.top = mouse.y + 'px';

                const dist = Math.sqrt(
                    Math.pow(thumbTip.x - indexTip.x, 2) + 
                    Math.pow(thumbTip.y - indexTip.y, 2)
                );

                if (dist < CONFIG.PINCH_THRESHOLD) {
                    if (!isPinching) {
                        isPinching = true;
                        if (now - lastAction > 800) {
                            const target = items.find(i => {
                                const d = Math.sqrt(Math.pow(i.cx - mouse.x, 2) + Math.pow(i.cy - mouse.y, 2));
                                return i.active ? d < 200 : d < 60;
                            });
                            if (target) handleSelect(target);
                            lastAction = now;
                        }
                    }
                    cursorEl.classList.add('pinched');
                } else {
                    isPinching = false;
                    cursorEl.classList.remove('pinched');
                }

                if (!activeItem) {
                    xHistory.push(palmCenter.x);
                    if (xHistory.length > 10) xHistory.shift();
                    if (xHistory.length >= 10 && !isPinching) {
                        const swipeX = xHistory[xHistory.length - 1] - xHistory[0];
                        if (Math.abs(swipeX) > 0.15) {
                            velocityX = swipeX * 120;
                            xHistory = []; 
                        }
                    }
                }
            }
        });

        try {
            const camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({ image: videoElement }); },
                width: 640, height: 480
            });
            await camera.start();
            updateStatus("SYSTEM: ONLINE<br>CONTROL: MOUSE + GESTURE ENABLED");
        } catch (e) {
            throw e;
        }
    }

    window.onload = bootstrap;
    window.onresize = () => initGrid();
</script>

</body>
</html>
