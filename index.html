<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nano Matrix // Pinch Trigger UX V20.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #080808;
            color: white;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            touch-action: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        #stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        .item {
            position: absolute;
            width: 60px; 
            height: 45px; 
            background-color: #222;
            border-radius: 3px;
            cursor: pointer;
            z-index: 10;
            will-change: transform;
            transform-origin: center center;
            backface-visibility: hidden;
        }

        .img-wrapper {
            width: 100%;
            height: 100%;
            overflow: hidden;
            border-radius: 3px;
            pointer-events: none;
        }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.8);
            transition: filter 0.4s;
        }

        .item.active {
            z-index: 5000 !important;
        }

        .item.active img {
            filter: brightness(1.1);
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
        }

        .info-content {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%) translateZ(0); 
            text-align: center;
            opacity: 0;
            width: 200px;
            pointer-events: none;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-transform: uppercase;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .item.active .info-content {
            opacity: 1;
            transition: opacity 0.4s ease-out 0.1s;
        }

        #setup-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 15px 40px;
            border: 1px solid rgba(255,255,255,0.3);
            margin: 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 3px;
            transition: all 0.3s;
        }
        .btn:hover { border-color: white; background: rgba(255,255,255,0.1); }

        #cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 50%;
            pointer-events: none;
            z-index: 10001;
            display: none;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background-color 0.2s;
        }
        
        #cursor.pinched {
            width: 12px;
            height: 12px;
            background-color: #fff;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        #gesture-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            letter-spacing: 2px;
            opacity: 0.6;
            text-transform: uppercase;
            pointer-events: none;
            text-align: center;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div id="setup-overlay">
    <h1 style="margin-bottom: 30px; letter-spacing: 10px; font-weight: 300;">MATRIX V20</h1>
    <div style="display:flex;">
        <div class="btn" onclick="start('mouse')">MOUSE</div>
        <div class="btn" onclick="start('gesture')" style="background:white; color:black; border:none;">GESTURE</div>
    </div>
</div>

<div id="stage">
    <div id="grid"></div>
    <div id="cursor"></div>
    <div id="gesture-hint">PINCH TO OPEN OR CLOSE<br>SWIPE HAND TO SCROLL GALLERY</div>
</div>

<script>
    const CONFIG = {
        W: 60, H: 45, GAP_X: 18, GAP_Y: 15,
        ROWS: 16, 
        BASE_SPEED: 0.15, 
        SCALE: 3.0, 
        LERP: 0.1, 
        REPULSION_RADIUS: 320, 
        REPULSION_STRENGTH: 130,
        FRICTION: 0.94,
        PINCH_THRESHOLD: 0.04 // 判定捏合的距离阈值
    };

    let items = [];
    let scrollX = 0;
    let velocityX = 0; 
    let totalW = 0;
    let mouse = { x: -100, y: -100 };
    let activeLeft = null;
    let activeRight = null;

    function init() {
        const sw = window.innerWidth;
        const sh = window.innerHeight;
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        items = [];

        const cols = Math.ceil(sw / (CONFIG.W + CONFIG.GAP_X)) + 18;
        totalW = cols * (CONFIG.W + CONFIG.GAP_X);
        const gridH = CONFIG.ROWS * (CONFIG.H + CONFIG.GAP_Y);
        const startY = (sh - gridH) / 2;

        for (let r = 0; r < CONFIG.ROWS; r++) {
            for (let c = 0; c < cols; c++) {
                const el = document.createElement('div');
                el.className = 'item';
                
                const rowOffset = (r % 2 === 0) ? 0 : (CONFIG.W + CONFIG.GAP_X) / 2;
                const bx = c * (CONFIG.W + CONFIG.GAP_X) + rowOffset;
                const by = startY + r * (CONFIG.H + CONFIG.GAP_Y) + CONFIG.H/2;

                el.innerHTML = `
                    <div class="img-wrapper">
                        <img src="https://picsum.photos/seed/${r*cols+c}/200/150">
                    </div>
                    <div class="info-content">NODE DATA 0${r}${c}</div>
                `;

                grid.appendChild(el);

                const itemObj = {
                    el: el, bx: bx, by: by, cx: bx, cy: by,
                    active: false, scale: 1, side: 'LEFT'
                };

                el.addEventListener('click', () => handleSelect(itemObj));
                items.push(itemObj);
            }
        }
        update();
    }

    function handleSelect(obj) {
        const sw = window.innerWidth;
        
        if (obj.active) {
            obj.active = false;
            obj.el.classList.remove('active');
            if (obj.side === 'LEFT') activeLeft = null;
            else activeRight = null;
            return;
        }

        let gx = (obj.bx + scrollX) % totalW;
        if (gx < -CONFIG.W) gx += totalW;
        if (gx > totalW - CONFIG.W) gx -= totalW;
        const currentScreenX = gx + CONFIG.W / 2;
        const side = (currentScreenX < sw / 2) ? 'LEFT' : 'RIGHT';

        if (side === 'LEFT') {
            if (activeLeft) { activeLeft.active = false; activeLeft.el.classList.remove('active'); }
            obj.side = 'LEFT'; obj.active = true; obj.el.classList.add('active'); activeLeft = obj;
        } else {
            if (activeRight) { activeRight.active = false; activeRight.el.classList.remove('active'); }
            obj.side = 'RIGHT'; obj.active = true; obj.el.classList.add('active'); activeRight = obj;
        }
    }

    function update() {
        if (Math.abs(velocityX) < 0.1) {
            velocityX = -CONFIG.BASE_SPEED;
        } else {
            velocityX *= CONFIG.FRICTION;
        }
        
        scrollX += velocityX;
        if (scrollX > 0) scrollX -= totalW;
        if (Math.abs(scrollX) >= totalW) scrollX = 0;

        const sw = window.innerWidth;
        const sh = window.innerHeight;

        items.forEach(item => {
            let baseTX, baseTY, ts;
            let gx = (item.bx + scrollX) % totalW;
            if (gx < -CONFIG.W) gx += totalW;
            if (gx > totalW - CONFIG.W) gx -= totalW;
            baseTX = gx + CONFIG.W / 2;
            baseTY = item.by;

            let finalTX = baseTX;
            let finalTY = baseTY;
            ts = 1;

            if (item.active) {
                const targetZoneX = (item.side === 'LEFT') ? sw * 0.25 : sw * 0.75;
                const targetZoneY = sh * 0.5;
                finalTX = targetZoneX;
                finalTY = targetZoneY;
                ts = CONFIG.SCALE;
            } else {
                let totalDX = 0;
                let totalDY = 0;
                [activeLeft, activeRight].forEach(activeItem => {
                    if (activeItem) {
                        const dx = baseTX - activeItem.cx;
                        const dy = baseTY - activeItem.cy;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < CONFIG.REPULSION_RADIUS) {
                            const force = (1 - dist / CONFIG.REPULSION_RADIUS);
                            totalDX += (dx / dist) * force * CONFIG.REPULSION_STRENGTH;
                            totalDY += (dy / dist) * force * CONFIG.REPULSION_STRENGTH;
                            ts *= (1 - force * 0.08);
                        }
                    }
                });
                finalTX += totalDX;
                finalTY += totalDY;
                if (!activeLeft && !activeRight) {
                    const dMouse = Math.sqrt(Math.pow(baseTX - mouse.x, 2) + Math.pow(baseTY - mouse.y, 2));
                    if (dMouse < 50) ts = 1.25;
                }
            }

            if (!item.active && Math.abs(finalTX - item.cx) > sw * 0.5) item.cx = finalTX;

            item.cx = lerp(item.cx, finalTX, CONFIG.LERP);
            item.cy = lerp(item.cy, finalTY, CONFIG.LERP);
            item.scale = lerp(item.scale, ts, CONFIG.LERP);
            item.el.style.transform = `translate3d(${item.cx}px, ${item.cy}px, 0) translate(-50%, -50%) scale(${item.scale})`;
        });

        requestAnimationFrame(update);
    }

    function lerp(a, b, f) { return a + (b - a) * f; }

    function start(mode) {
        document.getElementById('setup-overlay').style.display = 'none';
        if (mode === 'mouse') {
            window.addEventListener('mousemove', e => {
                mouse.x = e.clientX; mouse.y = e.clientY;
            });
            document.getElementById('cursor').style.display = 'block';
        } else {
            initGestures();
        }
    }

    function initGestures() {
        const videoElement = document.createElement('video');
        videoElement.style.display = 'none';
        document.body.appendChild(videoElement);
        const cursorEl = document.getElementById('cursor');

        const hands = new Hands({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });

        let lastAction = 0;
        let xHistory = []; 
        let isPinching = false;

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                const now = Date.now();
                
                const thumbTip = lm[4];
                const indexTip = lm[8];
                const palmCenter = lm[9]; 
                
                // 1. 光标跟随 (食指指尖)
                mouse.x = (1 - indexTip.x) * window.innerWidth;
                mouse.y = indexTip.y * window.innerHeight;
                cursorEl.style.display = 'block';

                // 2. 捏合识别 (Pinch) - 选中或关闭
                const dist = Math.sqrt(
                    Math.pow(thumbTip.x - indexTip.x, 2) + 
                    Math.pow(thumbTip.y - indexTip.y, 2)
                );

                if (dist < CONFIG.PINCH_THRESHOLD) {
                    if (!isPinching) { // 边缘触发：刚捏合的瞬间
                        isPinching = true;
                        cursorEl.classList.add('pinched');
                        
                        if (now - lastAction > 500) {
                            const target = items.find(i => {
                                const d = Math.sqrt(Math.pow(i.cx - mouse.x, 2) + Math.pow(i.cy - mouse.y, 2));
                                return i.active ? d < 120 : d < 60;
                            });
                            if (target) handleSelect(target);
                            lastAction = now;
                        }
                    }
                } else {
                    isPinching = false;
                    cursorEl.classList.remove('pinched');
                }

                // 3. 挥手滚动 (Swipe)
                if (!activeLeft && !activeRight) {
                    xHistory.push(palmCenter.x);
                    if (xHistory.length > 10) xHistory.shift();
                    
                    if (xHistory.length >= 10 && !isPinching) {
                        const swipeX = xHistory[xHistory.length - 1] - xHistory[0];
                        if (Math.abs(swipeX) > 0.15) {
                            velocityX = swipeX * 70; 
                            xHistory = []; 
                        }
                    }
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480
        });
        camera.start();
    }

    window.onload = init;
    window.onresize = () => init();
</script>

</body>
</html>
